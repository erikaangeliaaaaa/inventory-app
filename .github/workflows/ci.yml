name: Inventory CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    # Menyiapkan database MySQL di environment GitHub Actions
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: inventory_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Diperbarui dari v3 ke v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Diperbarui dari v4 ke v5
        with:
          python-version: "3.12"

      - name: Install Dependencies and Run Tests
        env:
        DATABASE_URL: mysql+pymysql://root:rootpassword@127.0.0.1:3306/inventory_db
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
        # 1. Pastikan pip versi terbaru
          python -m pip install --upgrade pip
        
        # 2. Instal library dari requirements.txt
          python -m pip install -r requirements.txt
        
        # 3. Instal pytest secara eksplisit (untuk memastikan ada di path)
          python -m pip install pytest pytest-cov
        
        # 4. Jalankan pengujian
          python -m pytest tests/ --cov=services --cov=models --cov-report=term --cov-report=xml
