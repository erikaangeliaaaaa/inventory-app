name: Inventory CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    # Menyiapkan database MySQL di environment GitHub Actions
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: inventory_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12" # Mengikuti versi Python yang Anda gunakan

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        env:
          DATABASE_URL: mysql+pymysql://root:rootpassword@127.0.0.1:3306/inventory_db
        run: |
          # Gunakan 'python -m pytest' untuk memastikan path terbaca
          python -m pytest tests/ --cov=services --cov=models --cov-report=term --cov-report=xml
