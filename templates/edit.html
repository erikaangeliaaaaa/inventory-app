<!doctype html>
<html>
  <head>
    <title>Edit Item</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        display: flex;
        justify-content: center;
        padding: 50px;
      }
      .card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        width: 300px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      a {
        display: block;
        text-align: center;
        margin-top: 10px;
        color: #777;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Edit Item</h2>
      <form method="POST">
        <input
          type="text"
          name="name"
          value="{{ item.nama }}"
          placeholder="Item Name"
          required
        />
        <input
          type="number"
          name="stock"
          value="{{ item.jumlah }}"
          placeholder="Stock"
          required
        />
        <button type="submit">Update Item</button>
      </form>
      <a href="/">Cancel</a>
    </div>
  </body>
</html>
